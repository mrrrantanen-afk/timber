<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palvelut | Timber Oy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="site-nav">
        <div class="nav-container">
            <a class="logo" href="index.html" aria-label="Timber Oy etusivu">
                <img src="images/Logo.webp" alt="Timber Oy logo">
            </a>

            <button class="hamburger" id="hamburger" type="button" aria-label="Avaa valikko" aria-controls="nav-links" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html#etusivu">Etusivu</a></li>
                <li><a href="index.html#palvelut">Palvelut</a></li>
                <li><a href="index.html#yhteys">Yhteystiedot</a></li>
            </ul>
        </div>
    </nav>

    <main class="content-box">
        <h1>Palvelumme</h1>
        <p>
            Timber Oy tarjoaa rakennusurakointia, rakennusmittausta sekä pientalorakentamista
            Lahden, Hämeenlinnan ja Kouvolan alueella.
        </p>
    </main>

    <footer>
        © 2026 Timber Oy
    </footer>

    <script>
        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("nav-links");

        hamburger.addEventListener("click", () => {
            const isOpen = navLinks.classList.toggle("active");
            hamburger.setAttribute("aria-expanded", String(isOpen));
        });
    </script>
</body>
</html>
